name: Validate

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Run manifest and packaging validation
        run: bash validate.sh

      - name: Run project tests
        run: |
          python3 -m unittest discover -s tests -p "test_*.py" -v
          node --test tests/test_utils.mjs tests/test_export_domain.mjs tests/test_settings_domain.mjs

      - name: Run Logics linter
        run: python3 logics/skills/logics-doc-linter/scripts/logics_lint.py
